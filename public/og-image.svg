<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ogBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B2041"/>
      <stop offset="50%" stop-color="#1E3A8A"/>
      <stop offset="100%" stop-color="#0B2041"/>
    </linearGradient>
    <radialGradient id="ogGlow1" cx="20%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ogGlow2" cx="85%" cy="80%" r="45%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#ogBg)"/>
  <rect width="1200" height="630" fill="url(#ogGlow1)"/>
  <rect width="1200" height="630" fill="url(#ogGlow2)"/>

  <!-- Grid pattern -->
  <g stroke="white" stroke-opacity="0.03" stroke-width="1">
    <line x1="0" y1="157" x2="1200" y2="157"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="472" x2="1200" y2="472"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
  </g>

  <!-- Logo mark -->
  <g transform="translate(80, 80)">
    <rect width="80" height="80" rx="18" fill="white" fill-opacity="0.1"/>
    <path d="M 22 60 L 40 20 L 58 60" stroke="white" stroke-width="5.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="30" y1="48" x2="50" y2="48" stroke="white" stroke-width="5.5" stroke-linecap="round"/>
    <circle cx="40" cy="20" r="4.5" fill="white"/>
  </g>
  <text x="180" y="137" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="700" fill="white" letter-spacing="-0.02em">AutoLabels.io</text>

  <!-- Hero headline -->
  <text x="80" y="310" font-family="Inter, system-ui, sans-serif" font-size="88" font-weight="800" fill="white" letter-spacing="-0.03em">Every label.</text>
  <text x="80" y="400" font-family="Inter, system-ui, sans-serif" font-size="88" font-weight="800" fill="white" letter-spacing="-0.03em">Every vehicle.</text>
  <text x="80" y="490" font-family="Inter, system-ui, sans-serif" font-size="88" font-weight="800" fill="#60A5FA" letter-spacing="-0.03em">Every deal.</text>

  <!-- Sub -->
  <text x="80" y="550" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="500" fill="white" fill-opacity="0.65">The dealer label platform that powers compliance and revenue.</text>

  <!-- Bottom accent bar -->
  <rect x="80" y="580" width="120" height="3" fill="#2563EB"/>
</svg>